trigger:
  paths:
    include:
      - terraform/**
  branches:
    include:
      - main

stages:
- stage: Terraform
  displayName: 'Provision Infrastructure'
  jobs:
  - job: Terraform_Apply
    displayName: 'Terraform Apply'
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # ✅ Install Terraform manually (NO extension needed)
    - script: |
        echo "Installing Terraform..."
        wget https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
        unzip -o terraform.zip
        sudo mv terraform /usr/local/bin/
        terraform -version
      displayName: 'Install Terraform'

    # ✅ Download SSH public key
    - task: DownloadSecureFile@1
      name: download_ssh_key
      inputs:
        secureFile: 'id_rsa.pub'

    # ✅ Copy key into Terraform module
    - script: |
        echo "Copying SSH public key into Terraform module"
        mkdir -p terraform/modules/compute
        cp $(download_ssh_key.secureFilePath) terraform/modules/compute/id_rsa.pub
        ls -al terraform/modules/compute/
      displayName: 'Prepare SSH Key'

    # ✅ Debug (so you NEVER get lost again)
    - script: |
        echo "Current directory:"
        pwd
        echo "Files in repo:"
        ls -R
      displayName: 'DEBUG FILES'

    # ✅ Run Terraform
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'azure-devops'
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)/terraform
        inlineScript: |
          echo "##[group]Terraform Init/Plan/Apply"

          terraform init
          terraform plan -var-file="envs/dev.tfvars"
          terraform apply -auto-approve -var-file="envs/dev.tfvars"

          echo "##[endgroup]"

    # ✅ Show outputs
    - script: terraform output
      workingDirectory: $(System.DefaultWorkingDirectory)/terraform
      displayName: 'Show Terraform Outputs'

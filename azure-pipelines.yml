trigger:
paths:
include:
- terraform/**
branches:
include:
- main

stages:

* stage: Terraform
  displayName: Provision Infrastructure

  jobs:

  * job: Terraform_Apply
    displayName: Terraform Apply

    pool:
    name: devops-hosted

    steps:

    * task: DownloadSecureFile@1
      name: download_ssh_key
      inputs:
      secureFile: id_rsa.pub

    * script: |
      echo "Copying SSH public key into Terraform module"

      mkdir -p ~/.ssh
      cp $(download_ssh_key.secureFilePath) ~/.ssh/id_rsa.pub
      cp $(download_ssh_key.secureFilePath) $(System.DefaultWorkingDirectory)/terraform/modules/compute/id_rsa.pub

      echo "Listing contents of terraform/modules/compute/"
      ls -al $(System.DefaultWorkingDirectory)/terraform/modules/compute/
      displayName: Extract SSH Public Key for Terraform

    * task: AzureCLI@2
      inputs:
      azureSubscription: it-azure-connection
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: $(System.DefaultWorkingDirectory)/terraform
      inlineScript: |
      echo "Terraform Init/Plan/Apply"

      ```
      terraform init
      terraform plan -var-file="envs/dev.tfvars"
      terraform apply -auto-approve -var-file="envs/dev.tfvars"
      ```
